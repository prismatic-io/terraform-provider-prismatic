name: release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up tools via mise
        uses: jdx/mise-action@v4.2.0

      - name: Compute and push tag
        id: bump
        run: |
          latest=$(svu current 2>/dev/null || echo "v0.0.0")
          new=$(svu "${{ inputs.bump }}")
          echo "Current: $latest"
          echo "New:     $new"
          if [ "$latest" = "$new" ]; then
            echo "svu produced no version change ($new) — nothing to release." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$new" -m "Release $new"
          git push origin "$new"
          echo "tag=$new" >> "$GITHUB_OUTPUT"

  goreleaser:
    needs: tag
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: 0

      - name: Set up tools via mise
        uses: jdx/mise-action@v4.2.0

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7.0.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Run GoReleaser
        run: goreleaser release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          # GitHub sets this automatically
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
