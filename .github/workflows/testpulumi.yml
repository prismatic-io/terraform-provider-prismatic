name: Acceptance (Pulumi)
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 17 * * 1"
permissions:
  contents: read
concurrency:
  group: prismatic-live-acc
  cancel-in-progress: false
jobs:
  pulumi-acc:
    name: Pulumi CRUD round-trip (live API)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v7.0.0
      - name: Set up tools via mise
        uses: jdx/mise-action@v4.2.0
      - name: Pulumi acceptance round-trip
        run: mise run testpulumi
        env:
          PRISMATIC_URL: ${{ secrets.PRISMATIC_URL }}
          PRISMATIC_REFRESH_TOKEN: ${{ secrets.PRISMATIC_REFRESH_TOKEN }}
          PRISMATIC_TENANT_ID: ${{ secrets.PRISMATIC_TENANT_ID }}
