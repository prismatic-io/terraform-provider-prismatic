[tools]
go = "1.26.4"
node = "26"
terraform = "1.15.7"
opentofu = "1.12.3"
# asdf backend: mise's default aqua backend ships a bad pulumi checksum on darwin/arm64.
"asdf:pulumi" = "3.202.0"
"github-cli" = "2.95.0"
golangci-lint = "2.12.2"
goreleaser = "2.16.0"
svu = "3.4.1"
"go:github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs" = "0.25.0"

[tasks.build]
description = "Compile the provider"
run = "go build -v ./..."

[tasks.install]
description = "Build and install the provider into GOBIN"
run = "go install ."

[tasks.init]
description = "Download and verify modules"
run = ["go mod download", "go mod verify"]

[tasks.fmt]
description = "Tidy modules and gofmt sources"
run = ["go mod tidy", "gofmt -l -w -s ."]

[tasks.check]
description = "Fail if any Go source is not gofmt-clean"
run = 'test -z "$(gofmt -l -s .)"'

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.test]
description = "Run tests (acceptance tests self-skip without TF_ACC)"
run = "go test ./... -timeout 120m"

[tasks.testacc]
description = "Run acceptance tests against a live Prismatic API"
env = { TF_ACC = "1" }
run = "go test ./... -v -timeout 10m"

[tasks."testacc:prism"]
description = "Run acceptance tests, sourcing URL/token/tenant from prism (FORCE=1 skips the prompt; PRISM_TARGET picks the task: testacc|testacc:tofu|testpulumi|testacc:all)"
run = '''
command -v prism >/dev/null 2>&1 || { echo "prism CLI not found on PATH — install it and run 'prism login'."; exit 1; }

me="$(prism me)" || { echo "Could not read your prism profile — run 'prism login' and try again."; exit 1; }
echo "$me"
echo
if [ "${FORCE:-}" = "1" ]; then
  echo "FORCE=1 — skipping confirmation."
else
  printf "Run acceptance tests against this stack/tenant/user? This creates and destroys real resources. [y/N] "
  read -r ack
  case "$ack" in
    y|Y|yes|YES) ;;
    *) echo "Aborted."; exit 1 ;;
  esac
fi

refresh_token="$(prism me:token --type refresh)"
if [ -z "$refresh_token" ]; then
  echo "Could not read a refresh token from prism — run 'prism login' and try again."
  exit 1
fi

url="$(printf '%s\n' "$me" | sed -n 's/^Endpoint URL: //p')"
export PRISMATIC_URL="${url:-${PRISMATIC_URL:-https://app.prismatic.io}}"
export PRISMATIC_REFRESH_TOKEN="$refresh_token"
tenant="$(printf '%s\n' "$me" | sed -n 's/^Tenant ID: //p')"
[ -n "$tenant" ] && export PRISMATIC_TENANT_ID="$tenant"

mise run "${PRISM_TARGET:-testacc}"
'''

[tasks."smoke:schema"]
description = "Prove the provider serves its schema under $ENGINE (terraform|tofu) via dev_overrides — no API, no secrets"
run = '''
set -eu
ENGINE="${ENGINE:-terraform}"
mkdir -p bin/smoke
go build -o "$PWD/bin/terraform-provider-prismatic" .

cat > bin/dev.tfrc <<EOF
provider_installation {
  dev_overrides {
    "registry.terraform.io/prismatic-io/prismatic" = "$PWD/bin"
  }
  direct {}
}
EOF
export TF_CLI_CONFIG_FILE="$PWD/bin/dev.tfrc"

cat > bin/smoke/main.tf <<'EOF'
terraform {
  required_providers {
    prismatic = { source = "registry.terraform.io/prismatic-io/prismatic" }
  }
}
provider "prismatic" {}
EOF

( cd bin/smoke && "$ENGINE" providers schema -json > /dev/null )
echo "OK: provider serves its schema under $ENGINE"
'''

[tasks."testacc:tofu"]
description = "Run the acceptance suite against OpenTofu instead of Terraform (needs a live Prismatic API; tofu comes from mise)"
env = { TF_ACC = "1", TF_ACC_PROVIDER_HOST = "registry.opentofu.org", TF_ACC_PROVIDER_NAMESPACE = "hashicorp" }
run = '''
set -eu
export TF_ACC_TERRAFORM_PATH="$(command -v tofu)"
go test ./... -v -timeout 10m
'''

[tasks.testpulumi]
description = "Pulumi CRUD round-trip against a live Prismatic API (pulumitest), bridging the freshly-built local provider"
env = { PULUMI_ACC = "1", PULUMI_SKIP_UPDATE_CHECK = "true" }
run = "go test ./pulumi-acc/... -v -timeout 20m"

[tasks."testacc:all"]
description = "Run every acceptance suite serially — Terraform, then OpenTofu, then Pulumi (needs a live Prismatic API; stops at the first failure)"
run = '''
set -eu
: "${PRISMATIC_URL:?set PRISMATIC_URL, or source creds from prism with: mise run testacc:all:prism}"
[ -n "${PRISMATIC_TOKEN:-}" ] || [ -n "${PRISMATIC_REFRESH_TOKEN:-}" ] || { echo "set PRISMATIC_TOKEN or PRISMATIC_REFRESH_TOKEN (or source creds from prism with: mise run testacc:all:prism)"; exit 1; }

mise run testacc
mise run testacc:tofu
mise run testpulumi
'''

[tasks."testacc:all:prism"]
description = "Run every acceptance suite serially (Terraform, OpenTofu, Pulumi), sourcing URL/token/tenant from prism"
env = { PRISM_TARGET = "testacc:all" }
run = "mise run testacc:prism"

[tasks.docs]
description = "Format examples and regenerate registry docs via tfplugindocs"
run = "go generate ./..."

[tasks.ci]
description = "Run everything CI runs (build, vet, gofmt, lint, test, docs + drift checks)"
depends = ["build", "vet", "check", "lint", "test", "docs"]
run = '''
go mod tidy
git diff --exit-code --compact-summary -- docs/ examples/ go.mod go.sum || {
  echo "Out of date — run 'mise run docs' and 'go mod tidy', then commit the result."
  exit 1
}
'''

[tasks.release]
description = "Trigger a release (usage: mise run release -- patch|minor|major) — CI tags and runs GoReleaser"
usage = 'arg "<bump>" help="patch, minor, or major"'
run = '''
set -eu

bump="$usage_bump"
case "$bump" in
    major|minor|patch) ;;
    *)
        echo "bump must be one of: patch, minor, major (got: $bump)" >&2
        exit 1
        ;;
esac

gh workflow run release.yml -f bump="$bump"
echo "Release workflow triggered with bump=$bump"
echo "  https://github.com/prismatic-io/terraform-provider-prismatic/actions/workflows/release.yml"
'''
